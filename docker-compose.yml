services:
  postgres:
    image: postgres:15
    container_name: teamslack_postgres
    environment:
      POSTGRES_USER: teamslack
      POSTGRES_PASSWORD: teamslack_dev  # Change in production
      POSTGRES_DB: teamslack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamslack"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: teamslack_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
